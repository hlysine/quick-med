backend:
  name: github
  branch: main
  repo: 'hlysine/quick-med'
  base_url: https://quick-med-auth.up.railway.app
  auth_endpoint: /auth
site_url: https://quick-med.up.railway.app
media_folder: 'public/assets'
public_folder: 'assets'
publish_mode: editorial_workflow
open_authoring: true
collections:
  - name: 'calc'
    label: 'Calculators'
    folder: 'src/content/calc'
    preview_path: 'calc/{{slug}}'
    create: false
    delete: false
    fields:
      - {
          label: 'Title',
          name: 'title',
          widget: 'string',
          hint: 'Main page title. Should equal top header in markdown',
        }
      - {
          label: 'Section',
          name: 'section',
          widget: 'string',
          hint: 'For section grouping in list view',
        }
      - {
          label: 'Keywords',
          name: 'keywords',
          widget: 'list',
          hint: 'Search terms associated with this page',
        }
      - {
          label: 'Todo link patterns',
          name: 'patterns',
          widget: 'list',
          required: false,
          hint: 'Case-insensitive regexes matched against todo text to link this page',
        }
      - { label: 'Body', name: 'body', widget: 'markdown' }
  - name: 'conditions'
    label: 'Conditions'
    folder: 'src/content/conditions'
    preview_path: 'conditions/{{slug}}'
    create: true
    fields:
